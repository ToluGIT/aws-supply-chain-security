name: supply-chain

# build -> keyless AWS auth -> push to ECR -> Inspector scan -> CVE gate ->
# Syft SBOM -> Cosign keyless sign -> SLSA provenance attestation ->
# verification gate (signature + identity + provenance). Fails closed.

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      app_dir:
        description: "Which app variant to build (app = clean, app-vulnerable = CVE test)"
        required: true
        default: "app"
        type: choice
        options: [app, app-vulnerable]

permissions:
  id-token: write      # mint the OIDC token for keyless AWS auth (and Cosign in Phase 3)
  contents: read

env:
  AWS_REGION: us-east-1
  ECR_REPO: scs-prod-ecr-app
  ECR_URI: 221082197153.dkr.ecr.us-east-1.amazonaws.com/scs-prod-ecr-app
  ROLE_ARN: arn:aws:iam::221082197153:role/scs-prod-role-gha-pipeline

jobs:
  build-scan-sbom:
    runs-on: ubuntu-latest
    outputs:
      image_digest: ${{ steps.build.outputs.digest }}
      image_ref: ${{ steps.build.outputs.image_ref }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve app dir
        id: appdir
        run: echo "dir=${{ github.event.inputs.app_dir || 'app' }}" >> "$GITHUB_OUTPUT"

      - name: Assume AWS role (keyless OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: ECR login
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        id: build
        run: |
          # Tag includes the variant so the clean and vulnerable builds of the
          # same commit do not collide on the immutable tag. "app" -> git-<sha>,
          # "app-vulnerable" -> git-<sha>-vuln.
          SUFFIX=""
          if [ "${{ steps.appdir.outputs.dir }}" = "app-vulnerable" ]; then SUFFIX="-vuln"; fi
          TAG="git-${GITHUB_SHA::12}${SUFFIX}"
          IMAGE_REF="${ECR_URI}:${TAG}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          docker build -t "$IMAGE_REF" "${{ steps.appdir.outputs.dir }}"
          docker push "$IMAGE_REF"
          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' "$IMAGE_REF" | cut -d@ -f2)
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"
          echo "image_ref=$IMAGE_REF" >> "$GITHUB_OUTPUT"
          echo "Pushed $IMAGE_REF @ $DIGEST"

      - name: Wait for Inspector scan
        run: |
          # ECR enhanced (Inspector) scanning reports status ACTIVE with
          # "Continuous scan is selected" — it never reports COMPLETE the way
          # basic scanning does. Instead, poll until Inspector has actually
          # produced findings (or a clean result) for this image digest.
          DIGEST="${{ steps.build.outputs.digest }}"
          echo "Waiting for Inspector to finish scanning $DIGEST ..."
          for i in $(seq 1 30); do
            TOTAL=$(aws inspector2 list-findings \
              --filter-criteria "{\"ecrImageHash\":[{\"comparison\":\"EQUALS\",\"value\":\"$DIGEST\"}]}" \
              --region "$AWS_REGION" \
              --query "length(findings)" --output text 2>/dev/null || echo 0)
            COVERAGE=$(aws inspector2 list-coverage \
              --filter-criteria "{\"ecrImageTags\":[{\"comparison\":\"EQUALS\",\"value\":\"${{ steps.build.outputs.tag }}\"}]}" \
              --region "$AWS_REGION" \
              --query "coveredResources[0].scanStatus.statusCode" --output text 2>/dev/null || echo "PENDING")
            echo "  attempt $i: coverage=$COVERAGE findings=$TOTAL"
            # ACTIVE coverage means Inspector has assessed the image
            if [ "$COVERAGE" = "ACTIVE" ]; then echo "scan assessed"; break; fi
            sleep 20
          done

      - name: CVE gate (fail on fixable CRITICAL or HIGH)
        run: |
          # Gate on findings that have a fix available. Unfixable base-image
          # CVEs (e.g. a perl CVE in python:3.12-slim with no upstream patch)
          # cannot be actioned by us, so gating on them would block every build
          # regardless of our dependency hygiene. We gate on what we can fix.
          DIGEST="${{ steps.build.outputs.digest }}"
          count_fixable() {
            aws inspector2 list-findings \
              --filter-criteria "{\"ecrImageHash\":[{\"comparison\":\"EQUALS\",\"value\":\"$DIGEST\"}],\"severity\":[{\"comparison\":\"EQUALS\",\"value\":\"$1\"}],\"fixAvailable\":[{\"comparison\":\"EQUALS\",\"value\":\"YES\"}]}" \
              --region "$AWS_REGION" --query "length(findings)" --output text
          }
          FIX_CRITICAL=$(count_fixable CRITICAL)
          FIX_HIGH=$(count_fixable HIGH)
          echo "Fixable CRITICAL findings: ${FIX_CRITICAL:-0}"
          echo "Fixable HIGH findings: ${FIX_HIGH:-0}"
          if [ "${FIX_CRITICAL:-0}" -gt 0 ] || [ "${FIX_HIGH:-0}" -gt 0 ]; then
            echo "::error::CVE gate failed — fixable CRITICAL=${FIX_CRITICAL} HIGH=${FIX_HIGH}. Image will not be signed."
            echo "Remediate by upgrading the flagged packages to their fixed versions."
            exit 1
          fi
          echo "CVE gate passed (no fixable CRITICAL or HIGH findings)."

      - name: Generate SBOM (Syft, CycloneDX)
        uses: anchore/sbom-action@v0
        with:
          image: ${{ steps.build.outputs.image_ref }}
          format: cyclonedx-json
          output-file: sbom.cyclonedx.json
          upload-artifact: true

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Cosign keyless sign (by digest)
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          # Keyless is the default in Cosign 2.x. The signing identity is the
          # GitHub OIDC token (audience: sigstore) -> Fulcio 10-min cert. The
          # signature OCI artifact is written back into ECR next to the image.
          # Always sign the DIGEST, never a tag: tags move, digests are content.
          cosign sign --yes "${ECR_URI}@${DIGEST}"

      - name: SLSA provenance attestation (keyless)
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          # Build a minimal SLSA provenance predicate describing this build,
          # then attach it to the image as a signed attestation. This is
          # SLSA Build L2: provenance is generated in the same job that builds.
          # True L3 needs an isolated reusable builder (slsa-github-generator);
          # documented honestly in the writeup.
          cat > provenance.json <<EOF
          {
            "buildType": "https://github.com/ToluGIT/aws-supply-chain-security/build@v1",
            "builder": { "id": "https://github.com/${GITHUB_REPOSITORY}/.github/workflows/supply-chain.yml@${GITHUB_REF}" },
            "invocation": {
              "configSource": {
                "uri": "git+https://github.com/${GITHUB_REPOSITORY}@${GITHUB_REF}",
                "digest": { "sha1": "${GITHUB_SHA}" },
                "entryPoint": ".github/workflows/supply-chain.yml"
              }
            },
            "metadata": {
              "buildInvocationId": "${GITHUB_RUN_ID}",
              "completeness": { "parameters": true, "environment": false, "materials": false }
            }
          }
          EOF
          cosign attest --yes --predicate provenance.json \
            --type slsaprovenance "${ECR_URI}@${DIGEST}"

      # Note: the SBOM is published as a workflow artifact (Syft step) and is
      # also exported to S3 by Inspector. We intentionally do NOT also attach
      # it as an OCI attestation: Cosign stores all attestations under a single
      # `sha256-<digest>.att` tag, and ECR tag immutability rejects the second
      # write once the SLSA provenance attestation has claimed that tag. The
      # provenance attestation is the one that travels with the image; the SBOM
      # travels as the run artifact and the S3 export.

      - name: Verify gate — signature + identity
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          # The two --certificate-* flags are the security boundary. Without
          # them this only proves "signed by some keyless identity". With them
          # it proves "signed by a workflow in THIS repo via GitHub's OIDC".
          cosign verify \
            --certificate-identity-regexp "^https://github.com/ToluGIT/aws-supply-chain-security/.*" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            "${ECR_URI}@${DIGEST}"

      - name: Verify gate — SLSA provenance attestation
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          cosign verify-attestation \
            --type slsaprovenance \
            --certificate-identity-regexp "^https://github.com/ToluGIT/aws-supply-chain-security/.*" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            "${ECR_URI}@${DIGEST}"
          echo "Image is signed, attested, and verified. Deployable."
